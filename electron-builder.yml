appId: world.corefirst.app
productName: CoreFirst
copyright: Copyright © 2025 CoreFirst Team

directories:
  output: release
  buildResources: public

files:
  - .next/standalone/**
  - .next/static/**
  - public/**
  - electron/main.js
  - electron/preload.js
  - package.json

extraResources:
  - from: .next/static
    to: .next/static
  - from: public
    to: public

# Register corefirst:// custom protocol for OAuth deep-link callbacks.
# See electron/main.ts for the full flow rationale.
protocols:
  - name: CoreFirst
    schemes: [corefirst]

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.education
  icon: public/icons/icon-512.png

win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/icons/icon-512.png

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Education

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
