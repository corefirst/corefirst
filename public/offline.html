<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreFirst — Offline</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f23;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin: 0; }
    p  { color: #94a3b8; margin: 0; }
    button {
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <h1>You're offline</h1>
  <p>CoreFirst needs a network connection to reach its AI providers.</p>
  <p>Connect to the internet and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
