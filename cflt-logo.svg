<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Academic Slate (Clean and Formal) -->
  <rect x="0" y="0" width="512" height="512" fill="#FFFFFF" />
  <rect x="10" y="10" width="492" height="492" rx="4" fill="none" stroke="#1E293B" stroke-width="2" />
  
  <!-- The Core-First Logical Chain (Structural Representation) -->
  <!-- Connector Line representing Linearization -->
  <line x1="120" y1="220" x2="400" y2="220" stroke="#1E293B" stroke-width="4" stroke-dasharray="8,8" opacity="0.3" />
  
  <!-- 1. The Core (Solid Node - The Salience Anchor) -->
  <rect x="100" y="180" width="80" height="80" fill="#1E293B" />
  
  <!-- 2. Condition/Reason (Outlined Node) -->
  <rect x="230" y="195" width="50" height="50" fill="none" stroke="#1E293B" stroke-width="4" />
  
  <!-- 3. Space/Context (Outlined Node) -->
  <rect x="320" y="205" width="30" height="30" fill="none" stroke="#1E293B" stroke-width="3" />
  
  <!-- 4. Time (Outlined Node) -->
  <circle cx="395" cy="220" r="10" fill="none" stroke="#1E293B" stroke-width="2" />

  <!-- Typography: CFLT (Academic Wordmark) -->
  <text x="256" y="420" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#1E293B" letter-spacing="12px">CFLT</text>
  
  <!-- Sub-label: Full Theory Name (Subtle Detail) -->
  <text x="256" y="455" font-family="Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="middle" fill="#64748B" letter-spacing="2px">CORE-FIRST LANGUAGE THEORY</text>
</svg>