<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant Blue Gradient (Liquid/Glass feel) from @corefirst-logo.svg -->
    <linearGradient id="vibrantBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" /> <!-- Blue-700 -->
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" /> <!-- Blue-500 -->
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" /> <!-- Blue-400 -->
    </linearGradient>

    <!-- Glowing Logic Line Gradient -->
    <linearGradient id="pulseLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#93C5FD;stop-opacity:0.2" />
    </linearGradient>

    <!-- Outer Glow for the Core -->
    <filter id="coreGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Inner Glow for circles to feel like "Glass Nodes" -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background: White (Retained for print clarity, but elements use glass style) -->
  <rect width="512" height="512" fill="#FFFFFF" />

  <!-- Main Composition: Centered and Balanced -->
  <g transform="translate(256, 256)" text-anchor="middle">
    
    <!-- 1. THE SYMBOL: Horizontal layout with @corefirst-logo.svg styling -->
    <g transform="translate(0, -90)">
      
      <!-- THE LOGIC PULSE: Multi-layered line -->
      <line x1="-180" y1="0" x2="180" y2="0" stroke="url(#pulseLine)" stroke-width="8" stroke-linecap="round" />
      <line x1="-180" y1="0" x2="180" y2="0" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="10,20" opacity="0.4" />
      
      <!-- Nodes: Size Decreasing Left to Right (Glass Style) -->
      
      <!-- CORE -->
      <circle cx="-160" cy="0" r="66" fill="url(#vibrantBlue)" filter="url(#coreGlow)" />
      <circle cx="-160" cy="0" r="66" fill="url(#innerGlow)" />
      
      <!-- CONDITION -->
      <circle cx="-10" cy="0" r="42" fill="#2563EB" />
      <circle cx="-10" cy="0" r="42" fill="url(#innerGlow)" />
      
      <!-- SPACE -->
      <circle cx="100" cy="0" r="26" fill="#3B82F6" />
      <circle cx="100" cy="0" r="26" fill="url(#innerGlow)" />
      
      <!-- TIME -->
      <circle cx="165" cy="0" r="16" fill="#60A5FA" />
      <circle cx="165" cy="0" r="16" fill="url(#innerGlow)" />

      <!-- Pulse Highlights (Sparkles) -->
      <circle cx="-85" cy="0" r="3" fill="#FFFFFF" opacity="0.6" />
      <circle cx="45" cy="0" r="2.5" fill="#FFFFFF" opacity="0.5" />
      <circle cx="135" cy="0" r="2" fill="#FFFFFF" opacity="0.4" />
    </g>

    <!-- 2. BRANDING: Solid foundation (Exact same as before) -->
    <g transform="translate(0, 110)">
      <text y="0" font-family="Inter, system-ui, sans-serif" font-size="94" font-weight="900" fill="#0F172A" letter-spacing="-4px">
        core<tspan fill="#2563EB">first</tspan>
      </text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#64748B" letter-spacing="6px" text-transform="uppercase">
        The Logic Transformation
      </text>
    </g>
  </g>

  <!-- Framing Accents -->
  <path d="M30 30 H70 M30 30 V70" stroke="#F1F5F9" stroke-width="2" fill="none" />
  <path d="M482 482 H442 M482 482 V442" stroke="#F1F5F9" stroke-width="2" fill="none" />
</svg>
